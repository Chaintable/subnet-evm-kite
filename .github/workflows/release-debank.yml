name: "Release DeBank artifacts"

on:
  release:
    types:
      - created
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag for manual runs (e.g. v0.8.0-debank5)"
        required: true
      ref:
        description: "Git ref to build (tag/branch/sha); empty = the dispatched ref"
        required: false
        default: ""

env:
  AWS_REGION: us-east-1
  REGISTRY: public.ecr.aws/b2h7a5c4/chaintable
  IMAGE: kite-writer
  DOCKERFILE: Dockerfile.debank
  AVALANCHE_VERSION: debank

jobs:
  build-artifacts:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: [self-hosted, "${{ matrix.arch }}"]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set env (determine image tag + resolve avalanchego commit)
        run: |
          REVISION="${{ github.event.inputs.version }}"
          [ -z "$REVISION" ] && REVISION=${GITHUB_REF#refs/*/}
          echo "REVISION=$REVISION" >> $GITHUB_ENV
          # Resolve AVALANCHE_VERSION (a branch name) to its current commit SHA, so the
          # Dockerfile's `git clone && git checkout` layer cache key changes whenever the
          # avalanchego-x-kite debank branch moves. Without this, Docker reuses the cached
          # clone and avalanchego changes never make it into the image.
          echo "AVALANCHE_VERSION=$(git ls-remote https://github.com/Chaintable/avalanchego-x-kite.git ${{ env.AVALANCHE_VERSION }} | cut -f1)" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Public ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          file: ${{ env.DOCKERFILE }}
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ matrix.arch }}-${{ env.REVISION }}
          build-args: |
            AVALANCHE_VERSION=${{ env.AVALANCHE_VERSION }}
          provenance: false

  merge-docker-manifest:
    runs-on: [self-hosted, general]
    needs: build-artifacts
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set env (determine image tag)
        run: |
          REVISION="${{ github.event.inputs.version }}"
          [ -z "$REVISION" ] && REVISION=${GITHUB_REF#refs/*/}
          echo "REVISION=$REVISION" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Public ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Merge manifest
        run: |
          docker buildx imagetools create \
            --tag ${REGISTRY}/${IMAGE}:${REVISION} \
            --tag ${REGISTRY}/${IMAGE}:latest \
            ${REGISTRY}/${IMAGE}:amd64-${REVISION} \
            ${REGISTRY}/${IMAGE}:arm64-${REVISION}

      - name: Lark Notification
        continue-on-error: true
        run: |
          notiv3 "Blockchain kite-writer released" ${REGISTRY}/${IMAGE}:${REVISION}
