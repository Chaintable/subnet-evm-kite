name: "Release DeBank artifacts"

on:
  release:
    types:
      - created
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1
  REGISTRY: 294354037686.dkr.ecr.ap-northeast-1.amazonaws.com
  IMAGE: blockchain/kite-x
  DOCKERFILE: Dockerfile.debank
  AVALANCHE_VERSION: debank

jobs:
  build-artifacts:
    strategy:
      matrix:
        arch: [amd64, arm64]
    runs-on: [self-hosted, "${{ matrix.arch }}"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set env (determine image tag + resolve avalanchego commit)
        run: |
          echo "REVISION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          # Resolve AVALANCHE_VERSION (a branch name) to its current commit SHA, so the
          # Dockerfile's `git clone && git checkout` layer cache key changes whenever the
          # avalanchego-x-kite debank branch moves. Without this, Docker reuses the cached
          # clone and avalanchego changes never make it into the image.
          echo "AVALANCHE_VERSION=$(git ls-remote https://github.com/Chaintable/avalanchego-x-kite.git ${{ env.AVALANCHE_VERSION }} | cut -f1)" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          file: ${{ env.DOCKERFILE }}
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ matrix.arch }}-${{ env.REVISION }}
          build-args: |
            AVALANCHE_VERSION=${{ env.AVALANCHE_VERSION }}
          provenance: false

  merge-docker-manifest:
    runs-on: [self-hosted, general]
    needs: build-artifacts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set env (determine image tag)
        run: |
          echo "REVISION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Merge manifest
        run: |
          docker pull --platform=linux/amd64 ${REGISTRY}/${IMAGE}:amd64-${REVISION}
          docker pull --platform=linux/arm64 ${REGISTRY}/${IMAGE}:arm64-${REVISION}
          docker buildx imagetools create --tag ${REGISTRY}/${IMAGE}:${REVISION} ${REGISTRY}/${IMAGE}:amd64-${REVISION} ${REGISTRY}/${IMAGE}:arm64-${REVISION}
          docker rmi ${REGISTRY}/${IMAGE}:amd64-${REVISION}
          docker rmi ${REGISTRY}/${IMAGE}:arm64-${REVISION}

      - name: Lark Notification
        continue-on-error: true
        run: |
          notiv3 "Blockchain kite-x released" ${REGISTRY}/${IMAGE}:${REVISION}
