name: "Retag image manifest"

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Existing tag to point the new tag at"
        required: true
      target_tag:
        description: "New tag to create"
        required: true

env:
  AWS_REGION: ap-northeast-1
  REGISTRY: 294354037686.dkr.ecr.ap-northeast-1.amazonaws.com
  IMAGE: blockchain/kite-x

jobs:
  retag:
    runs-on: [self-hosted, general]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create target tag from source manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ inputs.target_tag }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ inputs.source_tag }}
